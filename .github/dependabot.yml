version: 2
updates:
  # Note: Swift dependencies are managed through the Xcode project
  # (macos/MrMark.xcodeproj), which Dependabot's swift ecosystem does not
  # support — it requires a Package.swift manifest at the configured
  # directory. Update SPM packages manually via Xcode.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
