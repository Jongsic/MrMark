version: 2
updates:
  - package-ecosystem: swift
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Take major (potentially breaking) upgrades deliberately, by hand.
      # Patch/minor updates (including security fixes) still flow automatically.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
