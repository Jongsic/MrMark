name: Release

# Tag a commit `vX.Y.Z` and push the tag to cut a release.
# Builds are ad-hoc signed (not notarized): users must right-click → Open
# on first launch. Revisit Developer ID signing + notarization later.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: brew install xcodegen

      # Same script contributors run locally — one packaging path for everyone.
      - name: Build & package DMG
        run: scripts/build-dmg.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/MrMark-*.dmg
          generate_release_notes: true
          body: |
            > **Note:** the macOS build is not notarized. On first launch,
            > right-click the app and choose **Open**.

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      # Same script contributors run locally; tests gate the release build.
      - name: Build & test
        working-directory: windows
        shell: cmd
        run: build.cmd test

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          Compress-Archive -Path windows\bin\MrMark.exe `
            -DestinationPath "build\MrMark-$env:GITHUB_REF_NAME-windows-x64.zip"

      # Attaches to the same release the macos job creates.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/MrMark-*-windows-x64.zip
