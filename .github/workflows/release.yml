name: Release

# Tag a commit `vX.Y.Z` and push the tag to cut a release.
# Builds are ad-hoc signed (not notarized): users must right-click → Open
# on first launch. Revisit Developer ID signing + notarization later.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: brew install xcodegen

      # Same script contributors run locally — one packaging path for everyone.
      - name: Build & package DMG
        run: scripts/build-dmg.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/MrMark-*.dmg
          generate_release_notes: true
          body: |
            Licensed under the [MIT License](https://github.com/Jongsic/MrMark/blob/main/LICENSE)
            — provided *as is*, without warranty of any kind.

            > **Note:** builds are not code-signed yet. macOS: right-click
            > the app and choose **Open** on first launch. Windows: if
            > SmartScreen appears, choose **More info → Run anyway**.

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      # Same script contributors run locally; tests gate the release build.
      - name: Build & test
        working-directory: windows
        shell: cmd
        run: build.cmd test

      # Per-user setup wizard (Inno Setup ships on the runner image).
      - name: Build installer
        working-directory: windows
        shell: cmd
        run: |
          set VER=%GITHUB_REF_NAME:v=%
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" /Q /DAppVersion=%VER% installer.iss

      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          Copy-Item LICENSE build\LICENSE.txt
          Compress-Archive -Path windows\bin\MrMark.exe, build\LICENSE.txt `
            -DestinationPath "build\MrMark-$env:GITHUB_REF_NAME-windows-x64-portable.zip"

      # Attaches to the same release the macos job creates.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            windows/bin/MrMark-Setup-*.exe
            build/MrMark-*-windows-x64-portable.zip
